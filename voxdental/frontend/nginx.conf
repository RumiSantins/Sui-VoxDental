server {
    listen 80;
    server_name localhost;

    # Permitir uploads grandes (archivos de audio para Whisper)
    client_max_body_size 50M;

    # Compresión gzip para mejor rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Sirve los archivos estáticos de React
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Vite/React Router corrección para errores 404 al recargar
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso para derivar tráfico /api al contenedor backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts extendidos para procesamiento de audio (Whisper puede demorar)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
